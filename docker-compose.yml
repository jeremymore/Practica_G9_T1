services:
  postgres:
    image: postgres:17
    container_name: postgres_ciberseguridad_etl
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_ciberseguridad_data:/var/lib/postgresql/data

volumes:
  postgres_ciberseguridad_data: